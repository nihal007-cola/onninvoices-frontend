<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#111827">
  <title>ONNinvoices - Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #111827;
      --surface: #0F172A;
      --card: #1F2937;
      --border: #374151;
      --text: #F9FAFB;
      --muted: #9CA3AF;
      --primary: #2563EB;
      --primary-hover: #3B82F6;
      --success: #10B981;
      --danger: #EF4444;
      --warning: #F59E0B;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .admin-container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
    .header h1 { font-size: 24px; font-weight: 700; }
    .header .subtitle { color: var(--muted); font-size: 14px; }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-owner { background: #8B5CF6; color: white; }
    .badge-admin { background: var(--primary); color: white; }
    .badge-viewer { background: var(--muted); color: white; }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: white;
    }
    .btn-primary { background: var(--primary); }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-success { background: var(--success); }
    .btn-success:hover { opacity: 0.9; }
    .btn-danger { background: var(--danger); }
    .btn-danger:hover { opacity: 0.9; }
    .btn-warning { background: var(--warning); color: #111827; }
    .btn-warning:hover { opacity: 0.9; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    input, select {
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      width: 100%;
    }
    input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 12px; align-items: end; }
    .form-grid .form-group { margin-bottom: 0; }
    .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 4px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); text-transform: uppercase; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; }
    .empty-state { text-align: center; padding: 40px; color: var(--muted); }
    .toast {
      position: fixed; top: 20px; right: 20px; z-index: 999;
      padding: 16px 24px; border-radius: 8px; color: white; font-weight: 600;
      max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      animation: slideIn 0.3s ease-out;
    }
    .toast-success { background: var(--success); }
    .toast-error { background: var(--danger); }
    .toast-info { background: var(--primary); }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .toast-hidden { animation: slideOut 0.3s ease-in forwards; }
    @keyframes slideOut {
      to { transform: translateX(100%); opacity: 0; }
    }
    .hidden { display: none !important; }
    .flex { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .gap-2 { gap: 8px; }
    .mt-4 { margin-top: 16px; }
    .mb-4 { margin-bottom: 16px; }
    .text-center { text-align: center; }
    .text-muted { color: var(--muted); }
    .text-sm { font-size: 13px; }

    /* Navigation bar for admin */
    .admin-nav {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .admin-nav .nav-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .admin-nav .nav-link:hover {
      background: var(--surface);
      color: var(--text);
    }
    .admin-nav .nav-link.active {
      color: var(--primary);
      background: rgba(37, 99, 235, 0.1);
    }

    @media (max-width: 768px) {
      .form-grid { grid-template-columns: 1fr; }
      .header { flex-direction: column; align-items: flex-start; }
      table { font-size: 13px; }
      th, td { padding: 8px 10px; }
      .admin-nav { width: 100%; justify-content: space-between; }
    }
  </style>
</head>
<body>

<div class="admin-container">
  <div class="header">
    <div>
      <h1>Admin Panel</h1>
      <div class="subtitle">Manage users and permissions</div>
    </div>
    <div class="admin-nav">
      <a href="/onninvoices-frontend/index.html" class="nav-link">← Go to App</a>
      <span id="userRole" class="badge badge-owner">OWNER</span>
      <span id="userPhone" class="text-muted text-sm"></span>
      <button onclick="logout()" class="btn btn-danger btn-sm">Logout</button>
    </div>
  </div>

  <!-- Add User Form -->
  <div class="card">
    <h2 class="text-sm mb-4" style="font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;">Add New User</h2>
    <form id="addUserForm" class="form-grid">
      <div class="form-group">
        <label>Phone Number *</label>
        <input type="tel" id="phone" placeholder="+91XXXXXXXXXX" required>
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" id="email" placeholder="user@example.com" required>
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="role">
          <option value="VIEWER">Viewer</option>
          <option value="ADMIN">Admin</option>
        </select>
      </div>
      <button type="submit" class="btn btn-success" style="height:42px;">Add User</button>
    </form>
  </div>

  <!-- Users Table -->
  <div class="card">
    <div class="flex" style="justify-content:space-between;margin-bottom:16px;">
      <h2 style="font-weight:600;color:var(--muted);text-transform:uppercase;font-size:13px;letter-spacing:0.5px;">All Users</h2>
      <button onclick="loadUsers()" class="btn btn-primary btn-sm">Refresh</button>
    </div>
    <div class="overflow-x-auto">
      <table>
        <thead>
          <tr>
            <th>Phone</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Added</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="usersTableBody">
          <tr><td colspan="6" class="empty-state">Loading users...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const API_URL = 'https://api.jamesmoriarty.in';
  const FRONTEND_BASE = '/onninvoices-frontend';
  let token = localStorage.getItem('token');
  let userRole = localStorage.getItem('userRole');

  // ==================== AUTH CHECK ====================
  async function checkAuth() {
    if (!token) {
      window.location.href = FRONTEND_BASE + '/login.html';
      return;
    }

    try {
      const response = await fetch(`${API_URL}/api/auth/me`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await response.json();

      if (!data.success || data.user.role !== 'OWNER') {
        showToast('Access denied. Owner only.', 'error');
        setTimeout(() => window.location.href = FRONTEND_BASE + '/index.html', 1500);
        return;
      }

      document.getElementById('userRole').textContent = data.user.role;
      document.getElementById('userPhone').textContent = data.user.phone;
      loadUsers();
    } catch (error) {
      console.error('Auth error:', error);
      window.location.href = FRONTEND_BASE + '/login.html';
    }
  }

  // ==================== LOAD USERS ====================
  async function loadUsers() {
    const tbody = document.getElementById('usersTableBody');
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Loading...</td></tr>';

    try {
      const response = await fetch(`${API_URL}/api/admin/users`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await response.json();

      if (data.success && data.users.length > 0) {
        tbody.innerHTML = data.users.map(user => `
          <tr>
            <td><strong>${user.phone_number}</strong></td>
            <td>${user.email || '-'}</td>
            <td><span class="badge badge-${user.role.toLowerCase()}">${user.role}</span></td>
            <td>${user.is_verified ? '✅ Verified' : '⏳ Pending'}</td>
            <td>${new Date(user.created_at).toLocaleDateString('en-IN')}</td>
            <td>
              ${user.role !== 'OWNER' ? `<button onclick="deleteUser('${user.user_id}')" class="btn btn-danger btn-sm">Delete</button>` : '<span class="text-muted text-sm">—</span>'}
            </td>
          </tr>
        `).join('');
      } else {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No users found</td></tr>';
      }
    } catch (error) {
      console.error('Failed to load users:', error);
      tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Failed to load users</td></tr>';
    }
  }

  // ==================== ADD USER ====================
  document.getElementById('addUserForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const phone = document.getElementById('phone').value.trim();
    const email = document.getElementById('email').value.trim();
    const role = document.getElementById('role').value;

    if (!phone) {
      showToast('Phone number required', 'error');
      return;
    }

    const btn = this.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Adding...';

    try {
      const response = await fetch(`${API_URL}/api/admin/users`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ phone, email, role })
      });
      const data = await response.json();

      btn.disabled = false;
      btn.textContent = 'Add User';

      if (data.success) {
        showToast(`User ${phone} added as ${role}`, 'success');
        document.getElementById('addUserForm').reset();
        loadUsers();
      } else {
        showToast('Error: ' + (data.error || data.detail || 'Unknown error'), 'error');
      }
    } catch (error) {
      btn.disabled = false;
      btn.textContent = 'Add User';
      showToast('Network error: ' + error.message, 'error');
    }
  });

  // ==================== DELETE USER ====================
  async function deleteUser(userId) {
    if (!confirm('Delete this user? This action cannot be undone.')) return;

    try {
      const response = await fetch(`${API_URL}/api/admin/users/${userId}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await response.json();

      if (data.success) {
        showToast('User deleted successfully', 'success');
        loadUsers();
      } else {
        showToast('Error: ' + (data.error || data.detail), 'error');
      }
    } catch (error) {
      showToast('Network error: ' + error.message, 'error');
    }
  }

  // ==================== LOGOUT ====================
  function logout() {
    localStorage.clear();
    showToast('Logged out successfully', 'info');
    setTimeout(() => window.location.href = FRONTEND_BASE + '/login.html', 500);
  }

  // ==================== TOAST ====================
  function showToast(message, type = 'info') {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();

    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.textContent = message;
    document.body.appendChild(toast);

    setTimeout(() => {
      toast.classList.add('toast-hidden');
      setTimeout(() => toast.remove(), 300);
    }, 4000);
  }

  // ==================== INIT ====================
  checkAuth();
</script>
</body>
</html>
